<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lingua — Real-Time Translator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;
  --border:rgba(255,255,255,0.08);--border-active:rgba(99,179,237,0.5);
  --text:#e8f0fe;--muted:#6b7a99;
  --accent:#63b3ed;--accent2:#76e4b7;--accent3:#f6ad55;--danger:#fc8181;
  --font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:920px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-name{font-size:1.2rem;font-weight:600;letter-spacing:-0.02em}
.logo-sub{font-size:0.68rem;color:var(--muted);font-family:var(--mono);letter-spacing:0.06em}
.net-status{display:flex;align-items:center;gap:7px;font-size:0.75rem;font-family:var(--mono);color:var(--muted)}
.net-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);box-shadow:0 0 6px var(--accent2);animation:blink 2s infinite}
.net-dot.offline{background:var(--accent3);box-shadow:0 0 6px var(--accent3)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

/* Tabs */
.tabs{display:flex;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:5px;margin-bottom:1.5rem}
.tab{flex:1;padding:8px 6px;background:transparent;border:none;border-radius:7px;color:var(--muted);font-family:var(--font);font-size:0.82rem;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.tab.active{background:var(--surface2);color:var(--text)}
.tab:hover:not(.active){color:var(--text)}

/* Lang row */
.lang-row{display:grid;grid-template-columns:1fr 44px 1fr;gap:12px;align-items:center;margin-bottom:1.5rem}
.lang-wrap label{display:block;font-size:0.68rem;font-family:var(--mono);color:var(--muted);margin-bottom:6px;letter-spacing:0.06em}
.lang-sel{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:0.95rem;font-weight:500;padding:10px 14px;appearance:none;cursor:pointer;transition:border-color 0.2s}
.lang-sel:focus{outline:none;border-color:var(--border-active)}
.swap-btn{width:44px;height:44px;margin-top:20px;background:var(--surface2);border:1px solid var(--border);border-radius:50%;color:var(--accent);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.swap-btn:hover{border-color:var(--accent);transform:rotate(180deg)}

/* Panels */
.panels{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.2rem}
@media(max-width:580px){.panels{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color 0.2s}
.panel.active{border-color:var(--border-active)}
.panel.output-active{border-color:rgba(118,228,183,0.4)}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:1px solid var(--border)}
.panel-lang{font-size:0.8rem;font-weight:600;color:var(--accent)}
.panel-lang.out{color:var(--accent2)}
.panel-acts{display:flex;gap:5px}
.ibtn{width:28px;height:28px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:0.78rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.ibtn:hover{border-color:var(--border-active);color:var(--accent)}
.ibtn.speaking{color:var(--accent2);border-color:rgba(118,228,183,0.5);animation:spk 0.8s infinite}
@keyframes spk{0%,100%{opacity:1}50%{opacity:0.4}}
.panel-body{padding:14px;min-height:120px}
textarea{width:100%;min-height:100px;background:transparent;border:none;outline:none;resize:none;color:var(--text);font-family:var(--font);font-size:1rem;line-height:1.6}
textarea::placeholder{color:var(--muted)}
.t-out{font-size:1rem;line-height:1.6;min-height:100px;white-space:pre-wrap;word-break:break-word}
.t-out .ph{color:var(--muted);font-style:italic}
.char-count{font-size:0.7rem;font-family:var(--mono);color:var(--muted);text-align:right;padding:0 14px 8px}
.det-badge{display:none;font-size:0.68rem;font-family:var(--mono);padding:2px 8px;border-radius:20px;background:rgba(246,173,85,0.1);color:var(--accent3);border:1px solid rgba(246,173,85,0.2)}

/* Dots */
.dots{display:inline-flex;gap:3px;align-items:center;margin-left:4px}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite}
.dots span:nth-child(2){animation-delay:0.2s}.dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.8);opacity:0.5}40%{transform:scale(1.1);opacity:1}}

/* Mic row */
.mic-row{display:flex;align-items:center;gap:20px;padding:1rem 1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:1.2rem}
.mic-btn{width:64px;height:64px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);color:var(--muted);font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.mic-btn:hover{border-color:var(--accent);color:var(--accent)}
.mic-btn.rec{border-color:var(--danger);color:var(--danger);background:rgba(252,129,129,0.1);animation:mpulse 1s infinite}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(252,129,129,0.3)}50%{box-shadow:0 0 0 14px rgba(252,129,129,0)}}
.mic-info strong{display:block;color:var(--text);font-size:0.85rem;margin-bottom:2px}
.mic-info{font-size:0.75rem;color:var(--muted);font-family:var(--mono)}

/* Quick phrases */
.qp-wrap{flex:1}
.qp-label{font-size:0.75rem;color:var(--muted);margin-bottom:6px}
.qp-btns{display:flex;flex-wrap:wrap;gap:6px}
.qp-btn{padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:0.75rem;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.qp-btn:hover{border-color:var(--border-active);color:var(--accent)}

/* Add lang */
.add-lang{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px dashed var(--border);border-radius:12px;padding:12px 14px;margin-bottom:1.2rem}
.add-lang span{font-size:0.8rem;color:var(--muted);white-space:nowrap}
.add-lang input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);padding:7px 12px;font-size:0.85rem;outline:none}
.add-lang input:focus{border-color:var(--border-active)}
.add-btn{padding:7px 16px;background:rgba(99,179,237,0.08);border:1px solid rgba(99,179,237,0.25);border-radius:8px;color:var(--accent);font-family:var(--font);font-size:0.82rem;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.add-btn:hover{background:rgba(99,179,237,0.18)}

/* Conversation */
.convo-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1.2rem}
.convo-hdr{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:0.78rem;font-family:var(--mono);color:var(--muted)}
.convo-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.75rem;margin-left:auto;font-family:var(--font)}
.convo-msgs{max-height:350px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.convo-msgs::-webkit-scrollbar{width:3px}
.convo-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.convo-empty{padding:3rem 1rem;text-align:center;color:var(--muted);font-size:0.85rem}
.bubble{max-width:80%;padding:10px 14px;border-radius:12px;font-size:0.9rem;line-height:1.5}
.bubble.left{background:var(--surface2);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:3px}
.bubble.right{background:rgba(99,179,237,0.1);border:1px solid rgba(99,179,237,0.2);align-self:flex-end;border-bottom-right-radius:3px}
.bubble-tag{font-size:0.65rem;font-family:var(--mono);padding:2px 6px;border-radius:4px;background:var(--surface2);color:var(--muted);display:inline-block;margin-bottom:4px}
.bubble.right .bubble-tag{background:rgba(99,179,237,0.15);color:var(--accent)}
.bubble-orig{font-size:0.78rem;color:var(--muted);margin-bottom:3px;font-style:italic}
.bubble-trans{color:var(--text)}
.convo-controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px;border-top:1px solid var(--border)}
.cmb{padding:10px;border-radius:8px;font-family:var(--font);font-size:0.82rem;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:7px;border:1px solid}
.cmb.a{background:rgba(99,179,237,0.07);color:var(--accent);border-color:rgba(99,179,237,0.2)}
.cmb.b{background:rgba(118,228,183,0.07);color:var(--accent2);border-color:rgba(118,228,183,0.2)}
.cmb.rec{animation:mpulse 1s infinite}

/* History */
.hist-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1rem}
.hist-toggle{width:100%;padding:12px 14px;background:transparent;border:none;cursor:pointer;color:var(--text);font-family:var(--font);font-size:0.85rem;font-weight:500;display:flex;align-items:center;justify-content:space-between;text-align:left}
.hist-cnt{font-size:0.75rem;color:var(--muted);font-family:var(--mono)}
.hist-list{padding:0 12px 12px;display:flex;flex-direction:column;gap:6px}
.hist-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;transition:border-color 0.15s}
.hist-item:hover{border-color:var(--border-active)}
.hi-pair{font-size:0.7rem;color:var(--muted);margin-bottom:3px}
.hi-orig{font-size:0.82rem;color:var(--text);margin-bottom:2px}
.hi-trans{font-size:0.82rem;color:var(--accent2);margin-bottom:2px}
.hi-time{font-size:0.67rem;color:var(--muted);font-family:var(--mono)}
.clr-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--font);font-size:0.8rem;padding:8px 18px;cursor:pointer;display:block;margin:0 auto}
.clr-btn:hover{border-color:var(--danger);color:var(--danger)}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:0.8rem;color:var(--text);font-family:var(--mono);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}

/* Modes */
.mode{display:none}.mode.active{display:block}

/* Lang tags on selects */
.lang-sel option{font-size:1rem}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🌐</div>
      <div>
        <div class="logo-name">Lingua</div>
        <div class="logo-sub">REAL-TIME TRANSLATOR</div>
      </div>
    </div>
    <div class="net-status">
      <div class="net-dot" id="netDot"></div>
      <span id="netLabel">online</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-translate" onclick="setMode('translate')">⇄ Translate</button>
    <button class="tab" id="tab-conversation" onclick="setMode('conversation')">💬 Conversation</button>
    <button class="tab" id="tab-history" onclick="setMode('history')">📋 History</button>
  </div>

  <!-- TRANSLATE -->
  <div class="mode active" id="mode-translate">
    <div class="lang-row">
      <div class="lang-wrap">
        <label>FROM</label>
        <select class="lang-sel" id="fromLang" onchange="onLangChange()"></select>
      </div>
      <button class="swap-btn" onclick="swapLangs()" title="Swap">⇄</button>
      <div class="lang-wrap">
        <label>TO</label>
        <select class="lang-sel" id="toLang" onchange="onLangChange()"></select>
      </div>
    </div>

    <div class="panels">
      <div class="panel" id="inPanel">
        <div class="panel-hdr">
          <span class="panel-lang" id="inLabel">🇬🇧 English</span>
          <div style="display:flex;align-items:center;gap:7px">
            <span class="det-badge" id="detBadge">✦ detected</span>
            <div class="panel-acts">
              <button class="ibtn" onclick="clearIn()" title="Clear">✕</button>
              <button class="ibtn" onclick="copyT('in')" title="Copy">⎘</button>
              <button class="ibtn" id="spkInBtn" onclick="speakT('in')" title="Speak">▶</button>
            </div>
          </div>
        </div>
        <div class="panel-body">
          <textarea id="inText" placeholder="Type or speak to translate…" oninput="onInput()" maxlength="1000"></textarea>
        </div>
        <div class="char-count"><span id="charCnt">0</span>/1000</div>
      </div>

      <div class="panel" id="outPanel">
        <div class="panel-hdr">
          <span class="panel-lang out" id="outLabel">🇬🇷 Greek</span>
          <div class="panel-acts">
            <button class="ibtn" onclick="copyT('out')" title="Copy">⎘</button>
            <button class="ibtn" id="spkOutBtn" onclick="speakT('out')" title="Speak">▶</button>
          </div>
        </div>
        <div class="panel-body">
          <div class="t-out" id="tOut"><span class="ph">Translation appears here…</span></div>
        </div>
      </div>
    </div>

    <div class="mic-row">
      <div style="text-align:center">
        <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
        <div class="mic-info" id="micInfo"><strong>Press to speak</strong>auto-detects language</div>
      </div>
      <div class="qp-wrap">
        <div class="qp-label">Quick phrases</div>
        <div class="qp-btns" id="qpBtns"></div>
      </div>
    </div>

    <div class="add-lang">
      <span>+ Add language</span>
      <input type="text" id="newLang" placeholder="e.g. French, Japanese, Arabic…" onkeydown="if(event.key==='Enter')addLang()">
      <button class="add-btn" onclick="addLang()">Add</button>
    </div>
  </div>

  <!-- CONVERSATION -->
  <div class="mode" id="mode-conversation">
    <div class="lang-row">
      <div class="lang-wrap">
        <label>SPEAKER A</label>
        <select class="lang-sel" id="convoA"></select>
      </div>
      <div style="margin-top:20px;text-align:center;font-size:1.4rem">💬</div>
      <div class="lang-wrap">
        <label>SPEAKER B</label>
        <select class="lang-sel" id="convoB"></select>
      </div>
    </div>
    <div class="convo-wrap">
      <div class="convo-hdr">
        <span>● Live conversation</span>
        <button class="convo-clear" onclick="clearConvo()">Clear</button>
      </div>
      <div class="convo-msgs" id="convoMsgs">
        <div class="convo-empty">Tap a button below to start speaking</div>
      </div>
      <div class="convo-controls">
        <button class="cmb a" id="cmbA" onclick="toggleConvoMic('A')">🎤 Speak as A</button>
        <button class="cmb b" id="cmbB" onclick="toggleConvoMic('B')">Speak as B 🎤</button>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="mode" id="mode-history">
    <div class="hist-box">
      <button class="hist-toggle" onclick="toggleHist()">
        <span>📋 Translation history</span>
        <span class="hist-cnt" id="histCnt">0 items</span>
      </button>
      <div class="hist-list" id="histList"></div>
    </div>
    <button class="clr-btn" onclick="clearHist()">Clear history</button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────
const LANGS = [
  {code:'en',name:'English',flag:'🇬🇧',bcp:'en-US'},
  {code:'el',name:'Greek',flag:'🇬🇷',bcp:'el-GR'},
  {code:'ne',name:'Nepali',flag:'🇳🇵',bcp:'ne-NP'},
  {code:'hi',name:'Hindi',flag:'🇮🇳',bcp:'hi-IN'},
];
const PHRASES = ['Hello!','Thank you','Where is…?','How much?','Help!','Yes / No','Good morning'];

let langs = [...LANGS];
let fromCode = 'en', toCode = 'el';
let tTimer = null;
let rec = null, recActive = false;
let convoRec = null, convoSide = null;
let speaking = null;
let cache = {};
let history = [];
let convoBubbles = [];

// ── Init ───────────────────────────────────────────────────────────────
(function init(){
  try { cache = JSON.parse(localStorage.getItem('lingua_cache')||'{}'); } catch(e){}
  try { history = JSON.parse(localStorage.getItem('lingua_hist')||'[]'); } catch(e){}
  buildSelects();
  buildPhrases();
  setupRec();
  updateNet();
  window.addEventListener('online', updateNet);
  window.addEventListener('offline', updateNet);
})();

function buildSelects(){
  const ids = ['fromLang','toLang','convoA','convoB'];
  ids.forEach(id=>{
    const s=document.getElementById(id); if(!s)return;
    const prev=s.value;
    s.innerHTML=langs.map(l=>`<option value="${l.code}">${l.flag} ${l.name}</option>`).join('');
    if(prev && langs.find(l=>l.code===prev)) s.value=prev;
  });
  document.getElementById('fromLang').value=fromCode;
  document.getElementById('toLang').value=toCode;
  document.getElementById('convoA').value='en';
  document.getElementById('convoB').value='el';
  updateLabels();
}

function updateLabels(){
  const f=lang(fromCode), t=lang(toCode);
  document.getElementById('inLabel').textContent=f.flag+' '+f.name;
  document.getElementById('outLabel').textContent=t.flag+' '+t.name;
}

function lang(code){ return langs.find(l=>l.code===code)||langs[0]; }

function buildPhrases(){
  const c=document.getElementById('qpBtns');
  c.innerHTML=PHRASES.map(p=>`<button class="qp-btn" onclick="usePhrase('${p.replace(/'/g,"\\'")}')"> ${p}</button>`).join('');
}

function usePhrase(p){
  document.getElementById('inText').value=p;
  onInput();
}

function updateNet(){
  const on=navigator.onLine;
  document.getElementById('netDot').className='net-dot'+(on?'':' offline');
  document.getElementById('netLabel').textContent=on?'online':'offline – cache only';
}

// ── Language actions ───────────────────────────────────────────────────
function onLangChange(){
  fromCode=document.getElementById('fromLang').value;
  toCode=document.getElementById('toLang').value;
  updateLabels();
  const t=document.getElementById('inText').value.trim();
  if(t) translate(t, fromCode, toCode, null, true);
}

function swapLangs(){
  [fromCode,toCode]=[toCode,fromCode];
  document.getElementById('fromLang').value=fromCode;
  document.getElementById('toLang').value=toCode;
  updateLabels();
  const cur=document.getElementById('tOut').textContent;
  if(cur && !cur.includes('Translation') && !cur.includes('Translating')){
    document.getElementById('inText').value=cur;
    onInput();
  }
}

function addLang(){
  const inp=document.getElementById('newLang');
  const name=inp.value.trim();
  if(!name){showToast('Enter a language name');return;}
  if(langs.find(l=>l.name.toLowerCase()===name.toLowerCase())){showToast('Already added');return;}
  const code=name.toLowerCase().replace(/\s+/g,'').slice(0,6);
  langs.push({code,name:name[0].toUpperCase()+name.slice(1),flag:'🌐',bcp:code.slice(0,2)+'-'+code.slice(0,2).toUpperCase()});
  buildSelects();
  inp.value='';
  showToast('Added '+name);
}

// ── Translation ─────────────────────────────────────────────────────────
function onInput(){
  const txt=document.getElementById('inText').value;
  document.getElementById('charCnt').textContent=txt.length;
  clearTimeout(tTimer);
  if(!txt.trim()){
    document.getElementById('tOut').innerHTML='<span class="ph">Translation appears here…</span>';
    document.getElementById('detBadge').style.display='none';
    return;
  }
  tTimer=setTimeout(()=>translate(txt.trim(),fromCode,toCode,null,true),550);
}

async function translate(text, fc, tc, callback, updateUI){
  const ck=`${fc}|${tc}|${text}`;
  if(cache[ck]){
    const r=cache[ck];
    if(callback){callback(r);return;}
    if(updateUI) displayResult(r,fc,tc,text,true);
    return;
  }
  if(!navigator.onLine && !callback){
    document.getElementById('tOut').innerHTML='<span style="color:var(--accent3)">⚠ Offline — no cached translation</span>';
    return;
  }
  if(updateUI){
    document.getElementById('tOut').innerHTML='<span style="color:var(--muted)">Translating<span class="dots"><span></span><span></span><span></span></span></span>';
  }
  try{
    const fl=lang(fc), tl=lang(tc);
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`You are a precise translator. Respond ONLY with JSON, no markdown, no explanation.
Format: {"translation":"...","detected":"en"}
"detected" is the ISO 639-1 code of the source language.
Preserve tone, register, and cultural nuance.`,
        messages:[{role:'user',content:`Translate from ${fl.name} to ${tl.name}: "${text}"`}]
      })
    });
    const d=await res.json();
    let raw=d.content?.[0]?.text||'{}';
    raw=raw.replace(/```json|```/g,'').trim();
    let parsed;
    try{parsed=JSON.parse(raw);}catch(e){parsed={translation:raw,detected:fc};}
    const result={translation:parsed.translation||raw,detected:parsed.detected||fc};
    cache[ck]=result;
    try{localStorage.setItem('lingua_cache',JSON.stringify(cache));}catch(e){}
    if(callback){callback(result);return;}
    if(updateUI){
      displayResult(result,fc,tc,text,false);
      addHist(text,result.translation,fl.name,tl.name);
    }
  }catch(err){
    if(updateUI) document.getElementById('tOut').innerHTML='<span style="color:var(--danger)">Translation failed — check connection</span>';
  }
}

function displayResult(r,fc,tc,orig,fromCache){
  document.getElementById('tOut').textContent=r.translation;
  const bd=document.getElementById('detBadge');
  bd.style.display=(r.detected&&r.detected!==fc)?'inline-block':'none';
  if(fromCache) showToast('Loaded from cache');
}

// ── History ────────────────────────────────────────────────────────────
function addHist(orig,trans,fn,tn){
  history.unshift({orig,trans,fn,tn,ts:Date.now()});
  if(history.length>60) history=history.slice(0,60);
  try{localStorage.setItem('lingua_hist',JSON.stringify(history));}catch(e){}
  renderHist();
}

function renderHist(){
  const list=document.getElementById('histList');
  const cnt=document.getElementById('histCnt');
  cnt.textContent=history.length+' items';
  if(!history.length){
    list.innerHTML='<div style="padding:1rem;text-align:center;color:var(--muted);font-size:0.82rem">No history yet</div>';
    return;
  }
  list.innerHTML=history.slice(0,25).map((h,i)=>`
    <div class="hist-item" onclick="loadHist(${i})">
      <div class="hi-pair">${h.fn} → ${h.tn}</div>
      <div class="hi-orig">${h.orig}</div>
      <div class="hi-trans">${h.trans}</div>
      <div class="hi-time">${new Date(h.ts).toLocaleString()}</div>
    </div>
  `).join('');
}

function loadHist(i){
  const h=history[i];
  setMode('translate');
  document.getElementById('inText').value=h.orig;
  document.getElementById('tOut').textContent=h.trans;
  document.getElementById('charCnt').textContent=h.orig.length;
}

function clearHist(){
  history=[];
  localStorage.removeItem('lingua_hist');
  renderHist();
  showToast('History cleared');
}

function toggleHist(){
  const l=document.getElementById('histList');
  l.style.display=l.style.display==='none'?'':'none';
}

// ── Speech recognition ─────────────────────────────────────────────────
function setupRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  rec=new SR();
  rec.continuous=false;
  rec.interimResults=true;
  rec.onresult=e=>{
    let final='',interim='';
    for(const r of e.results){
      if(r.isFinal) final+=r[0].transcript;
      else interim+=r[0].transcript;
    }
    const txt=final||interim;
    document.getElementById('inText').value=txt;
    document.getElementById('charCnt').textContent=txt.length;
    if(final) onInput();
  };
  rec.onerror=e=>{
    recActive=false; updateMicUI(false);
    if(e.error!=='aborted') showToast('Mic: '+e.error);
  };
  rec.onend=()=>{recActive=false;updateMicUI(false);};
}

function toggleMic(){
  if(!rec){showToast('Speech not supported in this browser');return;}
  if(recActive){rec.stop();recActive=false;updateMicUI(false);}
  else{
    rec.lang=lang(fromCode).bcp||'en-US';
    rec.start();recActive=true;updateMicUI(true);
  }
}

function updateMicUI(on){
  const b=document.getElementById('micBtn');
  const i=document.getElementById('micInfo');
  if(on){
    b.classList.add('rec');b.textContent='⏹';
    i.innerHTML='<strong style="color:var(--danger)">Listening…</strong>tap to stop';
  }else{
    b.classList.remove('rec');b.textContent='🎤';
    i.innerHTML='<strong>Press to speak</strong>auto-detects language';
  }
}

// ── TTS ────────────────────────────────────────────────────────────────
function speakT(which){
  const txt=which==='in'
    ?document.getElementById('inText').value
    :document.getElementById('tOut').textContent;
  if(!txt||txt.includes('Translation')||txt.includes('Translating')){showToast('Nothing to speak');return;}
  const code=which==='in'?fromCode:toCode;
  const l=lang(code);
  const btnId=which==='in'?'spkInBtn':'spkOutBtn';
  const btn=document.getElementById(btnId);
  if(speaking){
    speechSynthesis.cancel();speaking=null;
    btn.classList.remove('speaking');btn.textContent='▶';return;
  }
  const u=new SpeechSynthesisUtterance(txt);
  u.lang=l.bcp||'en-US';u.rate=0.9;
  btn.classList.add('speaking');btn.textContent='⏹';
  u.onend=u.onerror=()=>{btn.classList.remove('speaking');btn.textContent='▶';speaking=null;};
  speaking=u;speechSynthesis.speak(u);
}

function speakAuto(txt, code){
  if(!txt) return;
  const l=lang(code);
  if(speaking) speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang=l.bcp||'en-US';u.rate=0.9;
  speaking=u;
  u.onend=()=>{speaking=null;};
  speechSynthesis.speak(u);
}

// ── Conversation ────────────────────────────────────────────────────────
function toggleConvoMic(side){
  if(convoSide){
    if(convoRec) convoRec.stop();
    resetConvoBtns();return;
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('Speech not supported');return;}
  const code=document.getElementById('convo'+side).value;
  const l=lang(code);
  convoRec=new SR();
  convoRec.lang=l.bcp||'en-US';
  convoRec.continuous=false;
  convoRec.interimResults=false;
  convoRec.onresult=e=>{
    let final='';
    for(const r of e.results) if(r.isFinal) final+=r[0].transcript;
    if(final) handleConvoSpeech(final,side);
  };
  convoRec.onerror=e=>{if(e.error!=='aborted')showToast('Mic: '+e.error);resetConvoBtns();};
  convoRec.onend=()=>resetConvoBtns();
  convoSide=side;
  const btn=document.getElementById('cmb'+side);
  btn.classList.add('rec');
  btn.textContent=side==='A'?'⏹ Stop':'Stop ⏹';
  convoRec.start();
}

function resetConvoBtns(){
  convoSide=null;
  const bA=document.getElementById('cmbA');
  const bB=document.getElementById('cmbB');
  if(bA){bA.classList.remove('rec');bA.textContent='🎤 Speak as A';}
  if(bB){bB.classList.remove('rec');bB.textContent='Speak as B 🎤';}
}

async function handleConvoSpeech(text,side){
  const fc=document.getElementById('convo'+side).value;
  const other=side==='A'?'B':'A';
  const tc=document.getElementById('convo'+other).value;
  const fl=lang(fc), tl=lang(tc);
  resetConvoBtns();

  // Add bubble with pending translation
  const id='bbl-'+Date.now();
  const msgs=document.getElementById('convoMsgs');
  const empty=msgs.querySelector('.convo-empty');
  if(empty) msgs.innerHTML='';
  const el=document.createElement('div');
  el.className='bubble '+(side==='A'?'left':'right');
  el.id=id;
  el.innerHTML=`
    <span class="bubble-tag">${fl.flag} ${fl.name} → ${tl.flag} ${tl.name}</span>
    <div class="bubble-orig">${text}</div>
    <div class="bubble-trans" id="bt-${id}" style="color:var(--muted)">Translating…</div>
  `;
  msgs.appendChild(el);
  msgs.scrollTop=msgs.scrollHeight;

  translate(text,fc,tc,result=>{
    const bt=document.getElementById('bt-'+id);
    if(bt){bt.textContent=result.translation;bt.style.color='';}
    msgs.scrollTop=msgs.scrollHeight;
    speakAuto(result.translation,tc);
    addHist(text,result.translation,fl.name,tl.name);
  },false);
}

function clearConvo(){
  document.getElementById('convoMsgs').innerHTML='<div class="convo-empty">Tap a button below to start speaking</div>';
  showToast('Conversation cleared');
}

// ── Utilities ───────────────────────────────────────────────────────────
function clearIn(){
  document.getElementById('inText').value='';
  document.getElementById('charCnt').textContent='0';
  document.getElementById('tOut').innerHTML='<span class="ph">Translation appears here…</span>';
  document.getElementById('detBadge').style.display='none';
}

function copyT(which){
  const txt=which==='in'
    ?document.getElementById('inText').value
    :document.getElementById('tOut').textContent;
  if(!txt) return;
  navigator.clipboard.writeText(txt).then(()=>showToast('Copied!'));
}

function setMode(m){
  ['translate','conversation','history'].forEach(x=>{
    document.getElementById('mode-'+x).classList.toggle('active',x===m);
    document.getElementById('tab-'+x).classList.toggle('active',x===m);
  });
  if(m==='history') renderHist();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),2200);
}
</script>
